{% extends 'layouts/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0">Users</h4>
  <a class="btn btn-primary" href="{{ url_for('admin.new_user') }}">New user</a>
</div>
<div class="table-responsive card shadow-sm">
  <table class="table mb-0">
    <thead class="table-light"><tr><th>Username</th><th>Name</th><th>Email</th><th>Role</th></tr></thead>
    <tbody>
      {% for u in rows %}
      <tr>
        <td>{{ u.username }}</td>
        <td>{{ u.full_name }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.role.name if u.role else '' }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
<p class="mt-3"><a href="{{ url_for('admin.audit') }}">Audit log</a></p>
{% endblock %}
